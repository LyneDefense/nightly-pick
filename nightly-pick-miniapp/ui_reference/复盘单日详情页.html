<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;family=Noto+Sans+SC:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#cce9dd",
                        "surface-variant": "#e5e2da",
                        "primary-fixed-dim": "#b1cdc2",
                        "inverse-on-surface": "#f4f1e8",
                        "on-secondary-fixed": "#0f1f18",
                        "on-primary-container": "#a4bfb5",
                        "surface": "#fcf9f0",
                        "on-tertiary-fixed-variant": "#504443",
                        "primary-container": "#364f46",
                        "on-background": "#1c1c17",
                        "on-primary-fixed-variant": "#334c44",
                        "surface-dim": "#dddad1",
                        "secondary": "#516259",
                        "surface-tint": "#4a645b",
                        "on-surface": "#1c1c17",
                        "secondary-fixed-dim": "#b8cbc0",
                        "on-surface-variant": "#414848",
                        "surface-bright": "#fcf9f0",
                        "tertiary-fixed-dim": "#d5c2c1",
                        "surface-container": "#f1eee5",
                        "tertiary": "#3c3130",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#d4e7db",
                        "surface-container-highest": "#e5e2da",
                        "outline": "#717878",
                        "secondary-fixed": "#d4e7db",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#b1cdc2",
                        "inverse-surface": "#31312b",
                        "on-secondary-container": "#57685f",
                        "outline-variant": "#c1c8c7",
                        "on-tertiary-fixed": "#231919",
                        "on-primary-fixed": "#062019",
                        "surface-container-high": "#ebe8df",
                        "on-error": "#ffffff",
                        "surface-container-low": "#f6f3ea",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#c7b5b4",
                        "on-error-container": "#93000a",
                        "primary": "#1f3830",
                        "background": "#fcf9f0",
                        "on-secondary-fixed-variant": "#3a4a42",
                        "tertiary-fixed": "#f1dedd",
                        "tertiary-container": "#544746",
                        "error": "#ba1a1a"
                    },
                    fontFamily: {
                        "serif": ["Noto Serif SC", "serif"],
                        "sans": ["Be Vietnam Pro", "Noto Sans SC", "sans-serif"],
                        "body": ["Be Vietnam Pro", "Noto Sans SC", "sans-serif"],
                        "label": ["Be Vietnam Pro", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .ink-texture {
            background-image: radial-gradient(#1f3830 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.03;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-sans antialiased selection:bg-secondary-container">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-[#fcf9f0]/70 backdrop-blur-xl flex items-center h-16 px-6">
<div class="flex items-center justify-between w-full">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:opacity-80 transition-opacity active:scale-95 duration-300">
<span class="material-symbols-outlined text-[#1f3830]" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-serif font-medium text-lg text-[#1f3830]">8月24日 22:30</span>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</div>
</header>
<main class="relative pt-24 pb-32 px-6 min-h-screen max-w-2xl mx-auto">
<!-- Subtle Paper Texture Overlay -->
<div class="fixed inset-0 pointer-events-none ink-texture"></div>
<!-- Main Content Area: The Digital Parchment -->
<article class="relative space-y-12">
<!-- Core AI Quote -->
<section class="relative">
<span class="absolute -top-6 -left-2 text-6xl font-serif text-secondary-fixed-dim opacity-40">“</span>
<h1 class="font-serif text-3xl md:text-4xl leading-relaxed text-primary font-medium pl-4 pr-2">
                    在琐碎的忙碌中，我们往往忘记了静止也是一种前行。
                </h1>
<div class="mt-4 flex justify-end">
<span class="text-xs font-label uppercase tracking-widest text-on-surface-variant/60">— 夜拾·AI 心语</span>
</div>
</section>
<!-- Atmospheric Visual Bridge -->
<!-- Daily Summary Section -->
<section class="space-y-4">
<h2 class="text-xs font-label font-bold uppercase tracking-[0.2em] text-primary/40">今日摘要</h2>
<div class="bg-surface-container-low p-8 rounded-lg">
<p class="text-lg leading-loose text-on-surface/90 font-light indent-8">
                        今天的工作比预想中更消耗精力，几个项目评审接踵而至，让人有些喘不过气。直到下班后的这段骑行，穿过那条梧桐树影斑驳的小路，秋夜的凉意才真正让头脑冷却下来。有些事不必急着在那一瞬间解决，放一放，月光下总会有新的视角。
                    </p>
</div>
</section>
<!-- Emotion Tags -->
<section class="space-y-4">
<h2 class="text-xs font-label font-bold uppercase tracking-[0.2em] text-primary/40">情绪脉络</h2>
<div class="flex flex-wrap gap-3">
<span class="px-5 py-2 rounded-full bg-secondary-container text-on-secondary-container text-sm font-medium border border-outline-variant/10">平静</span>
<span class="px-5 py-2 rounded-full bg-tertiary-fixed text-on-tertiary-fixed-variant text-sm font-medium border border-outline-variant/10">略有焦虑</span>
<span class="px-5 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium border border-outline-variant/10">释然</span>
</div>
</section>
<!-- Focus Items (Unresolved/Important) -->
<section class="space-y-4">
<h2 class="text-xs font-label font-bold uppercase tracking-[0.2em] text-primary/40">挂心的事</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex items-center gap-4 p-5 bg-white rounded-lg shadow-sm border-l-4 border-primary/20">
<span class="material-symbols-outlined text-primary/60" data-icon="event">event</span>
<span class="text-md text-on-surface">明天10点的项目评审</span>
</div>
<div class="flex items-center gap-4 p-5 bg-white rounded-lg shadow-sm border-l-4 border-secondary/20">
<span class="material-symbols-outlined text-secondary/60" data-icon="call">call</span>
<span class="text-md text-on-surface">给家里打个电话</span>
</div>
</div>
</section>
</article>
</main>
<!-- Bottom Action Bar (Transactional Suppression of Nav Shell) -->
<footer class="fixed bottom-0 w-full z-50 pb-safe bg-[#fcf9f0]/90 backdrop-blur-md">
<div class="flex justify-around items-center h-20 px-8 max-w-md mx-auto">
<button class="flex flex-col items-center justify-center p-3 text-on-surface-variant hover:text-primary transition-colors active:scale-95">
<span class="material-symbols-outlined text-2xl" data-icon="edit_note">edit_note</span>
<span class="text-[10px] mt-1 font-medium tracking-wide">编辑</span>
</button>
<button class="flex flex-col items-center justify-center p-3 text-on-surface-variant hover:text-primary transition-colors active:scale-95">
<span class="material-symbols-outlined text-2xl" data-icon="share">share</span>
<span class="text-[10px] mt-1 font-medium tracking-wide">分享</span>
</button>
<button class="flex flex-col items-center justify-center p-3 text-on-surface-variant hover:text-error transition-colors active:scale-95">
<span class="material-symbols-outlined text-2xl" data-icon="delete_outline">delete_outline</span>
<span class="text-[10px] mt-1 font-medium tracking-wide">删除</span>
</button>
</div>
</footer>
</body></html>
