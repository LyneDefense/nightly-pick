<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#231919",
                        "surface-variant": "#e5e2da",
                        "surface-container-highest": "#e5e2da",
                        "surface": "#fcf9f0",
                        "tertiary-fixed-dim": "#d5c2c1",
                        "on-secondary-fixed-variant": "#3a4a42",
                        "secondary-container": "#d4e7db",
                        "secondary": "#516259",
                        "on-surface-variant": "#414848",
                        "inverse-primary": "#b1cdc2",
                        "on-secondary-fixed": "#0f1f18",
                        "on-error-container": "#93000a",
                        "background": "#fcf9f0",
                        "secondary-fixed-dim": "#b8cbc0",
                        "primary-fixed-dim": "#b1cdc2",
                        "tertiary-fixed": "#f1dedd",
                        "secondary-fixed": "#d4e7db",
                        "on-tertiary-fixed-variant": "#504443",
                        "on-error": "#ffffff",
                        "primary": "#1f3830",
                        "on-tertiary-container": "#c7b5b4",
                        "tertiary-container": "#544746",
                        "primary-container": "#364f46",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#ebe8df",
                        "primary-fixed": "#cce9dd",
                        "outline": "#717878",
                        "error": "#ba1a1a",
                        "inverse-surface": "#31312b",
                        "outline-variant": "#c1c8c7",
                        "surface-container-low": "#f6f3ea",
                        "on-primary-fixed": "#062019",
                        "surface-container": "#f1eee5",
                        "surface-tint": "#4a645b",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#1c1c17",
                        "inverse-on-surface": "#f4f1e8",
                        "on-primary-fixed-variant": "#334c44",
                        "on-primary-container": "#a4bfb5",
                        "surface-dim": "#dddad1",
                        "on-background": "#1c1c17",
                        "tertiary": "#3c3130",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#57685f",
                        "surface-bright": "#fcf9f0"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif SC", "serif"],
                        "body": ["Be Vietnam Pro", "sans-serif"],
                        "label": ["Be Vietnam Pro", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #fcf9f0;
            color: #1c1c17;
            -webkit-font-smoothing: antialiased;
        }
        .paper-shadow {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
        }
        .tonal-shift-elevation {
            background: rgba(252, 249, 240, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body selection:bg-primary-fixed-dim selection:text-on-primary-fixed">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fcf9f0]/70 dark:bg-stone-950/70 backdrop-blur-xl shadow-sm dark:shadow-none flex justify-between items-center px-6 h-16">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#f6f3ea] transition-colors duration-300 active:scale-90 text-[#1f3830]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline text-2xl tracking-tight font-bold text-[#1f3830]">Profile Settings</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#f6f3ea] transition-colors duration-300 active:scale-90 text-[#1f3830]">
<span class="material-symbols-outlined" data-icon="check">check</span>
</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-12">
<!-- Avatar Section -->
<section class="flex flex-col items-center">
<div class="relative group">
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-surface-container-lowest paper-shadow">
<img alt="Lin Shu Profile" class="w-full h-full object-cover" data-alt="Soft ethereal portrait of a young Asian woman with a gentle expression in a minimalist sunlit room with warm natural light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEbUgZ2slAUZ74v9LdAxLk-tGTZSDqxoiMBxaBOK2_lVN0DAkWjlYVT4DNsF12XPeDqkGj6gf0Z5mxoROH5LTBBq2_Gz6ufiS0Km7AVZhiw03Z5Y16cSmlVEK0JOr-gFBmwIjJN54dIyt6hhphBcddpybC5Hw1RJ7HMll184I5MesKueaL4VKZDv4-NLoWdF_6IOJB9kXPfNjzX2_UYx9yLCyY4rDH4lDBUHJK_LTdluUtNUFhsPb0JqZuOi2negP0Dsnb5gJ36gTe"/>
</div>
<button class="absolute bottom-0 right-0 w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-lg transform translate-x-1 translate-y-1 hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-sm" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<p class="mt-4 font-label text-sm text-secondary tracking-widest uppercase">Member since 2023</p>
</section>
<!-- Form Fields -->
<form class="space-y-8">
<!-- Nickname -->
<div class="group">
<label class="block font-headline text-lg text-primary mb-3 pl-1">Nickname (昵称)</label>
<div class="bg-surface-container-low rounded-xl p-1 focus-within:ring-2 focus-within:ring-primary-fixed-dim transition-all">
<input class="w-full bg-transparent border-none focus:ring-0 px-4 py-3 text-on-surface font-body text-lg placeholder:text-outline-variant" placeholder="Enter your name" type="text" value="Lin Shu (林舒)"/>
</div>
</div>
<!-- Email -->
<div class="group">
<label class="block font-headline text-lg text-primary mb-3 pl-1 opacity-70">Email (邮箱)</label>
<div class="bg-surface-container-high rounded-xl p-1 cursor-not-allowed">
<div class="flex items-center px-4 py-3">
<input class="w-full bg-transparent border-none focus:ring-0 text-secondary font-body text-lg cursor-not-allowed" readonly="" type="email" value="lin.shu@example.com"/>
<span class="material-symbols-outlined text-outline-variant text-xl" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<p class="mt-2 pl-1 text-xs text-outline font-label">Contact support to change your primary email.</p>
</div>
<!-- Personal Signature -->
<div class="group">
<label class="block font-headline text-lg text-primary mb-3 pl-1">Personal Signature (个人简介)</label>
<div class="bg-surface-container-low rounded-xl p-1 focus-within:ring-2 focus-within:ring-primary-fixed-dim transition-all">
<textarea class="w-full bg-transparent border-none focus:ring-0 px-4 py-3 text-on-surface font-body text-lg resize-none placeholder:text-outline-variant" placeholder="Share your midnight thoughts..." rows="4">Capturing the fleeting whispers of the night. A seeker of quiet moments and moonlit reflections.</textarea>
</div>
</div>
<!-- Account Security Extra -->
<div class="pt-6 space-y-4">
<h3 class="font-headline text-xl text-primary border-b border-outline-variant/20 pb-2">Account Privacy</h3>
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl paper-shadow">
<div>
<p class="font-body font-medium text-on-surface">Private Journal Mode</p>
<p class="font-label text-xs text-secondary">Only you can view your nightly entries.</p>
</div>
<div class="w-12 h-6 bg-primary-container rounded-full relative">
<div class="absolute right-1 top-1 w-4 h-4 bg-on-primary-container rounded-full"></div>
</div>
</div>
</div>
</form>
<!-- Log Out / Danger Zone -->
<div class="pt-12 text-center">
<button class="text-error font-headline tracking-wide px-8 py-3 rounded-full hover:bg-error-container/20 transition-colors">
                Sign out of all devices
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full bg-[#fcf9f0] dark:bg-stone-950 rounded-t-[3rem] z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] flex justify-around items-center px-4 py-3">
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-600 hover:text-[#1f3830] transition-all duration-300 ease-out scale-98" href="#">
<span class="material-symbols-outlined" data-icon="book_2">book_2</span>
<span class="font-sans text-[11px] font-medium tracking-wide">Journal</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-600 hover:text-[#1f3830] transition-all duration-300 ease-out scale-98" href="#">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="font-sans text-[11px] font-medium tracking-wide">Moments</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-600 hover:text-[#1f3830] transition-all duration-300 ease-out scale-98" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-sans text-[11px] font-medium tracking-wide">Archive</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#ebe8df] dark:bg-stone-800 text-[#1f3830] dark:text-stone-100 rounded-full w-14 h-14 transition-all duration-300 ease-out scale-98" href="#">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-sans text-[11px] font-medium tracking-wide">Settings</span>
</a>
</nav>
</body></html>
