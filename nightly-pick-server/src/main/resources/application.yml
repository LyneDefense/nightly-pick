spring:
  application:
    name: nightly-pick-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nightly_pick}
    username: ${DB_USERNAME:nightly_pick}
    password: ${DB_PASSWORD:nightly_pick}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

agent:
  base-url: ${AGENT_BASE_URL:http://localhost:8000}

business-day:
  reset-hour: ${BUSINESS_DAY_RESET_HOUR:6}

logging:
  level:
    root: INFO
    com.nightlypick.server: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [requestId=%X{requestId} sessionId=%X{sessionId}] - %msg%n"
